name: Update KBO Results

on:
  schedule:
    # 매일 한국시간 23:30 (UTC 14:30) - 경기 종료 후
    - cron: '30 14 * * *'
  workflow_dispatch: # 수동 트리거

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Crawl KBO Results
        run: node scripts/crawl-results.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || git commit -m "Update KBO game results $(date +%Y-%m-%d)"
          git push
